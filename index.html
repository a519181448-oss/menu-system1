<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>财富食代菜单宝</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: linear-gradient(135deg, #f5e6d0 0%, #d4b896 100%); min-height: 100vh; padding: 15px; }
        .container { max-width: 100%; margin: 0 auto; }
        .card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .header { text-align: center; margin-bottom: 25px; padding: 25px 20px; background: linear-gradient(135deg, #8B5A2B 0%, #A0522D 100%); border-radius: 16px; color: white; }
        .logo { width: 90px; height: 90px; margin: 0 auto 15px; display: block; border-radius: 50%; object-fit: contain; background: white; padding: 8px; }
        h1 { color: white; margin-bottom: 8px; font-size: 28px; }
        .subtitle { font-size: 16px; opacity: 0.9; }
        h2 { color: #8B5A2B; font-size: 22px; margin-bottom: 18px; padding-bottom: 12px; border-bottom: 3px solid #f5e6d0; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; color: #666; font-size: 16px; }
        input, select { width: 100%; padding: 14px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 16px; }
        input:focus, select:focus { outline: none; border-color: #8B5A2B; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        .btn-primary { background: linear-gradient(135deg, #8B5A2B 0%, #A0522D 100%); color: white; }
        .btn-secondary { background: #f5e6d0; color: #8B5A2B; border: 1px solid #8B5A2B; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-success { background: #28a745; color: white; }
        .dish-list { max-height: 400px; overflow-y: auto; border: 2px solid #e0e0e0; border-radius: 10px; padding: 12px; }
        .dish-item { display: flex; align-items: center; padding: 15px; margin: 8px 0; background: #f8f9fa; border-radius: 10px; cursor: pointer; border: 2px solid transparent; }
        .dish-item.selected { background: #8B5A2B; color: white; border-color: #6d4623; }
        .dish-info { flex: 1; }
        .dish-name { font-weight: bold; font-size: 18px; }
        .dish-desc { font-size: 14px; color: #999; margin-top: 4px; }
        .dish-item.selected .dish-desc { color: rgba(255,255,255,0.8); }
        .menu-result { background: #f8f9fa; border-radius: 12px; padding: 20px; margin-top: 15px; }
        .stats { display: flex; justify-content: space-around; text-align: center; }
        .stat-item { flex: 1; }
        .stat-value { font-size: 28px; font-weight: bold; color: #8B5A2B; }
        .stat-label { font-size: 14px; color: #666; }
        .hidden { display: none !important; }
        .step-indicator { display: flex; justify-content: center; margin-bottom: 20px; }
        .step { width: 35px; height: 35px; border-radius: 50%; background: #e0e0e0; color: #666; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: bold; margin: 0 8px; }
        .step.active { background: #8B5A2B; color: white; }
        .step.completed { background: #28a745; color: white; }
        .footer { text-align: center; margin-top: 20px; color: #666; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="logo.png" alt="财富食代Logo" class="logo">
            <h1>财富食代菜单宝</h1>
            <p class="subtitle">专业餐饮管理助手</p>
        </div>

        <div class="step-indicator">
            <div class="step active" data-step="1">1</div>
            <div class="step" data-step="2">2</div>
            <div class="step" data-step="3">3</div>
            <div class="step" data-step="4">4</div>
        </div>

        <div class="card" id="step1">
            <h2>📚 菜品库管理</h2>
            <div class="form-group">
                <label>菜名</label>
                <input type="text" id="dishName" placeholder="输入菜名">
            </div>
            <div class="form-group">
                <label>分类</label>
                <select id="dishCategory">
                    <option value="热菜">热菜</option>
                    <option value="凉菜">凉菜</option>
                    <option value="汤品">汤品</option>
                    <option value="主食">主食</option>
                    <option value="饮品">饮品</option>
                    <option value="甜点">甜点</option>
                </select>
            </div>
            <div class="form-group">
                <label>描述（可选）</label>
                <input type="text" id="dishDesc" placeholder="输入菜品描述">
            </div>
            <button class="btn btn-primary" onclick="addDish()">➕ 添加菜品</button>
            <button class="btn btn-danger" onclick="clearAllDishes()">🗑️ 清空所有菜品</button>
        </div>

        <div class="card hidden" id="step2">
            <h2>📝 选择菜品</h2>
            <div class="dish-list" id="dishList"></div>
            <p id="selectedCount" style="margin-top: 15px; font-size: 16px; color: #666;">已选：0 道菜</p>
            <button class="btn btn-secondary" onclick="clearSelection()">清空选择</button>
            <button class="btn btn-primary" onclick="showStep(3)">下一步：预订信息</button>
        </div>

        <div class="card hidden" id="step3">
            <h2>📅 预订信息</h2>
            <div class="form-group">
                <label>预订时间</label>
                <input type="datetime-local" id="bookTime">
            </div>
            <div class="form-group">
                <label>预订包厢</label>
                <select id="bookRoom">
                    <option value="">请选择包厢</option>
                    <option value="一帆风顺">一帆风顺</option>
                    <option value="二龙腾飞">二龙腾飞</option>
                    <option value="三星高照">三星高照</option>
                    <option value="五福临门">五福临门</option>
                    <option value="六六大顺">六六大顺</option>
                    <option value="八方来财">八方来财</option>
                    <option value="九九归一">九九归一</option>
                    <option value="十全十美">十全十美</option>
                    <option value="临时补开">临时补开</option>
                </select>
            </div>
            <div class="form-group">
                <label>预订人</label>
                <input type="text" id="bookName" placeholder="输入预订人姓名">
            </div>
            <div class="form-group">
                <label>联系电话</label>
                <input type="tel" id="bookPhone" placeholder="输入联系电话">
            </div>
            <button class="btn btn-secondary" onclick="showStep(2)">返回修改菜品</button>
            <button class="btn btn-primary" onclick="generateMenu()">生成菜单</button>
        </div>

        <div class="card hidden" id="step4">
            <h2>📋 桌菜单</h2>
            <div class="menu-result" id="menuPreview">
                <div id="menuContent"></div>
            </div>
            <button class="btn btn-primary" onclick="window.print()">🖨️ 打印菜单</button>
            <button class="btn btn-success" onclick="saveAsImage()">💾 保存为图片</button>
            <button class="btn btn-danger" onclick="clearOrder()">🗑️ 清空订单</button>
        </div>

        <div class="card">
            <h2>📊 营业统计</h2>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="totalOrders">0</div>
                    <div class="stat-label">订单数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="totalDishes">0</div>
                    <div class="stat-label">已点菜品</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="totalIncome">0</div>
                    <div class="stat-label">预计收入</div>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>财富食代菜单宝 © 2026</p>
        </div>
    </div>

    <script>
        var dishes = JSON.parse(localStorage.getItem('menuDishes')) || [];
        var selectedDishes = [];
        var orders = JSON.parse(localStorage.getItem('menuOrders')) || [];

        document.addEventListener('DOMContentLoaded', function() {
            renderDishList();
            updateStats();
        });

        function showStep(step) {
            var cards = document.querySelectorAll('.card[id^="step"]');
            for (var i = 0; i < cards.length; i++) {
                cards[i].classList.add('hidden');
            }
            document.getElementById('step' + step).classList.remove('hidden');

            var steps = document.querySelectorAll('.step');
            for (var j = 0; j < steps.length; j++) {
                steps[j].classList.remove('active', 'completed');
                var s = parseInt(steps[j].dataset.step);
                if (s === step) steps[j].classList.add('active');
                else if (s < step) steps[j].classList.add('completed');
            }

            if (step === 2) renderDishList();
        }

        function addDish() {
            var name = document.getElementById('dishName').value.trim();
            var category = document.getElementById('dishCategory').value;
            var desc = document.getElementById('dishDesc').value.trim();
            if (!name) { alert('请输入菜名'); return; }
            dishes.push({ id: Date.now(), name: name, category: category, description: desc });
            localStorage.setItem('menuDishes', JSON.stringify(dishes));
            document.getElementById('dishName').value = '';
            document.getElementById('dishDesc').value = '';
            alert('菜品添加成功！');
        }

        function clearAllDishes() {
            if (confirm('确定要清空所有菜品吗？')) {
                dishes = [];
                localStorage.setItem('menuDishes', JSON.stringify(dishes));
                renderDishList();
            }
        }

        function renderDishList() {
            var dishList = document.getElementById('dishList');
            dishList.innerHTML = '';
            if (dishes.length === 0) {
                dishList.innerHTML = '<p style="text-align:center;color:#999;padding:20px;">暂无菜品，请先添加菜品</p>';
                return;
            }
            for (var i = 0; i < dishes.length; i++) {
                var dish = dishes[i];
                var isSelected = false;
                for (var j = 0; j < selectedDishes.length; j++) {
                    if (selectedDishes[j].id === dish.id) { isSelected = true; break; }
                }
                var div = document.createElement('div');
                div.className = 'dish-item' + (isSelected ? ' selected' : '');
                div.innerHTML = '<div class="dish-info"><div class="dish-name">' + dish.name + '</div><div class="dish-desc">' + dish.category + (dish.description ? ' - ' + dish.description : '') + '</div></div>';
                div.setAttribute('data-id', dish.id);
                div.onclick = function() { toggleDish(parseInt(this.getAttribute('data-id'))); };
                dishList.appendChild(div);
            }
            document.getElementById('selectedCount').textContent = '已选：' + selectedDishes.length + ' 道菜';
        }

        function toggleDish(id) {
            var index = -1;
            for (var i = 0; i < selectedDishes.length; i++) {
                if (selectedDishes[i].id === id) { index = i; break; }
            }
            if (index > -1) selectedDishes.splice(index, 1);
            else {
                for (var j = 0; j < dishes.length; j++) {
                    if (dishes[j].id === id) { selectedDishes.push(dishes[j]); break; }
                }
            }
            renderDishList();
        }

        function clearSelection() { selectedDishes = []; renderDishList(); }

        function generateMenu() {
            var time = document.getElementById('bookTime').value;
            var room = document.getElementById('bookRoom').value;
            var name = document.getElementById('bookName').value.trim();
            var phone = document.getElementById('bookPhone').value.trim();
            if (!time || !room || !name || !phone) { alert('请填写完整的预订信息'); return; }
            if (selectedDishes.length === 0) { alert('请至少选择一道菜品'); return; }
            
            var html = '<div style="text-align:center;margin-bottom:20px;">';
            html += '<h2 style="color:#8B5A2B;">财富食代</h2>';
            html += '<p>预订时间：' + time + '</p>';
            html += '<p>预订包厢：' + room + '</p>';
            html += '<p>预订人：' + name + '</p>';
            html += '<p>联系电话：' + phone + '</p></div>';
            html += '<table style="width:100%;border-collapse:collapse;"><thead><tr style="background:#f5f5f5;">';
            html += '<th style="border:1px solid #ddd;padding:10px;">序号</th>';
            html += '<th style="border:1px solid #ddd;padding:10px;">菜名</th>';
            html += '<th style="border:1px solid #ddd;padding:10px;">分类</th>';
            html += '<th style="border:1px solid #ddd;padding:10px;">描述</th></tr></thead><tbody>';
            for (var i = 0; i < selectedDishes.length; i++) {
                html += '<tr><td style="border:1px solid #ddd;padding:10px;text-align:center;">' + (i+1) + '</td>';
                html += '<td style="border:1px solid #ddd;padding:10px;">' + selectedDishes[i].name + '</td>';
                html += '<td style="border:1px solid #ddd;padding:10px;">' + selectedDishes[i].category + '</td>';
                html += '<td style="border:1px solid #ddd;padding:10px;">' + (selectedDishes[i].description || '-') + '</td></tr>';
            }
            html += '</tbody></table><div style="text-align:right;margin-top:20px;"><p>共计：' + selectedDishes.length + ' 道菜</p></div>';
            
            document.getElementById('menuContent').innerHTML = html;
            
            var order = { time: time, room: room, name: name, phone: phone, dishes: selectedDishes.slice(), timestamp: Date.now() };
            orders.push(order);
            localStorage.setItem('menuOrders', JSON.stringify(orders));
            updateStats();
            showStep(4);
        }

        function saveAsImage() {
            var element = document.getElementById('menuPreview');
            html2canvas(element).then(function(canvas) {
                var link = document.createElement('a');
                link.download = '菜单_' + Date.now() + '.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        function clearOrder() {
            if (confirm('确定要清空当前订单吗？')) {
                document.getElementById('menuContent').innerHTML = '';
                showStep(1);
            }
        }

        function updateStats() {
            document.getElementById('totalOrders').textContent = orders.length;
            var total = 0;
            for (var i = 0; i < orders.length; i++) total += orders[i].dishes.length;
            document.getElementById('totalDishes').textContent = total;
            document.getElementById('totalIncome').textContent = '0';
        }
    </script>
</body>
</html>
